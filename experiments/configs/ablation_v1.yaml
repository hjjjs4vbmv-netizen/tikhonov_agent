# ablation_v1.yaml
# Ablation study: systematically disable individual agent components
# to isolate their contribution to reconstruction quality.

experiment:
  name: ablation_v1
  description: "Ablation: disable verifier / replanner / bounds / stability / discrepancy / reg_order"
  output_dir: experiments/runs/ablation_v1
  cases_dir: experiments/cases/benchmark_v1   # reuse benchmark cases

physics:
  geometry:
    length: 0.05
    n_cells: 50
  material:
    density: 7800.0
    specific_heat: 500.0
    conductivity: 50.0
  boundary_conditions:
    right_type: "dirichlet"
    right_value: 300.0
  initial_condition: 300.0

time:
  start: 0.0
  end: 60.0
  n_steps: 121

sensors:
  default_positions: [0.01, 0.03]

factors:
  flux_families:
    - step
    - single_pulse
    - smooth_sinusoid
  noise_levels: [0.5]
  sensor_counts: [2]
  time_resolutions: [1.0]
  seeds: [42]

flux_params:
  step:
    q_base: 0.0
    q_step: 50000.0
    t_on_frac: 0.3
  ramp:
    q_start: 0.0
    q_end: 80000.0
  single_pulse:
    q_base: 0.0
    q_peak: 60000.0
    t_center_frac: 0.4
    t_width_frac: 0.2
  multi_pulse:
    q_base: 0.0
    q_peak: 50000.0
    n_pulses: 3
    t_width_frac: 0.08
  smooth_sinusoid:
    q_mean: 40000.0
    q_amplitude: 20000.0
    n_cycles: 2.0

# Ablation variants: each disables exactly one component vs the full_agent baseline
variants:
  full_agent_baseline:
    reg_order: 1
    max_retries: 8
    iteration_budget: 12
    physical_bounds: [-5.0e5, 5.0e5]

  no_replanner:
    reg_order: 1
    max_retries: 8
    iteration_budget: 1     # single shot, no replanning
    physical_bounds: [-5.0e5, 5.0e5]

  no_bounds:
    reg_order: 1
    max_retries: 8
    iteration_budget: 12
    # physical_bounds omitted → no clamping or bounds check

  fixed_reg_order_0:
    reg_order: 0            # identity regularisation (never switches)
    max_retries: 8
    iteration_budget: 12
    physical_bounds: [-5.0e5, 5.0e5]

  fixed_reg_order_2:
    reg_order: 2            # second-difference (never switches)
    max_retries: 8
    iteration_budget: 12
    physical_bounds: [-5.0e5, 5.0e5]

  fixed_lambda_ablation:
    lambda_value: 1.0       # disable auto lambda selection
    reg_order: 1
    iteration_budget: 12
    max_retries: 8
    physical_bounds: [-5.0e5, 5.0e5]

  no_verifier:
    # Ablation: bypass all verification and acceptance logic.
    # The agent runs a single Tikhonov solve (iteration_budget=1) and
    # accepts the result unconditionally, regardless of fit quality or
    # physical plausibility.  Isolates the contribution of the verifier
    # from the contribution of the replanning loop.
    reg_order: 1
    max_retries: 8
    iteration_budget: 12
    physical_bounds: [-5.0e5, 5.0e5]
    skip_verifier: true
