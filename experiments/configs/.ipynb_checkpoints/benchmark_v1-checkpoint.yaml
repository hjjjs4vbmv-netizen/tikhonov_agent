# benchmark_v1.yaml
# Main benchmark for Tikhonov agent comparison across four solver variants.
# Factors: flux family × noise level × seed.

experiment:
  name: benchmark_v1
  description: "Systematic benchmark: 4 variants × 5 flux families × 3 noise levels × 2 seeds"
  output_dir: experiments/runs/benchmark_v1
  cases_dir: experiments/cases/benchmark_v1

# Physical setup shared across all benchmark cases
physics:
  geometry:
    length: 0.05      # [m]  5 cm steel rod
    n_cells: 50
  material:
    density: 7800.0
    specific_heat: 500.0
    conductivity: 50.0
  boundary_conditions:
    right_type: "dirichlet"
    right_value: 300.0   # [K]
  initial_condition: 300.0  # [K]

time:
  start: 0.0
  end: 60.0
  n_steps: 121      # dt = 0.5 s

sensors:
  default_positions: [0.01, 0.03]   # [m]  two sensors

# Experimental factors
factors:
  flux_families:
    - step
    - ramp
    - single_pulse
    - multi_pulse
    - smooth_sinusoid
  noise_levels:      # [K] Gaussian std on temperature observations
    - 0.1
    - 0.5
    - 1.0
  sensor_counts: [2]
  time_resolutions: [1.0]   # 1.0 = default 121 steps; 0.5 = 61 steps
  seeds: [42, 123]

# Flux family parameters
flux_params:
  step:
    q_base: 0.0
    q_step: 50000.0    # [W/m^2]  step amplitude
    t_on_frac: 0.3     # fraction of total time when step turns on
  ramp:
    q_start: 0.0
    q_end: 80000.0
  single_pulse:
    q_base: 0.0
    q_peak: 60000.0
    t_center_frac: 0.4
    t_width_frac: 0.2
  multi_pulse:
    q_base: 0.0
    q_peak: 50000.0
    n_pulses: 3
    t_width_frac: 0.08
  smooth_sinusoid:
    q_mean: 40000.0
    q_amplitude: 20000.0
    n_cycles: 2.0

# Variant-specific solver overrides
variants:
  fixed_solver:
    lambda_value: 1.0      # intentionally naive fixed lambda
    reg_order: 1
    iteration_budget: 1
    max_retries: 1
  auto_solver:
    reg_order: 1
    iteration_budget: 1
    max_retries: 1
    # lambda_strategy chosen by planner (lcurve or discrepancy)
  solver_plus_verifier:
    reg_order: 1
    iteration_budget: 1
    max_retries: 1
    physical_bounds: [-5.0e5, 5.0e5]
  full_agent:
    reg_order: 1
    max_retries: 8
    iteration_budget: 12
    physical_bounds: [-5.0e5, 5.0e5]
