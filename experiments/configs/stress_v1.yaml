# stress_v1.yaml
# Stress tests: difficult configurations that push the agent to its limits.

experiment:
  name: stress_v1
  description: "Stress tests: high noise, few sensors, distant sensors, reduced resolution, high dimension"
  output_dir: experiments/runs/stress_v1
  cases_dir: experiments/cases/stress_v1

physics:
  geometry:
    length: 0.05
    n_cells: 50
  material:
    density: 7800.0
    specific_heat: 500.0
    conductivity: 50.0
  boundary_conditions:
    right_type: "dirichlet"
    right_value: 300.0
  initial_condition: 300.0

time:
  start: 0.0
  end: 60.0
  n_steps: 121

sensors:
  default_positions: [0.01, 0.03]

# Stress test factors (each dimension stressed one at a time)
stress_scenarios:
  high_noise:
    noise_levels: [2.0, 5.0]
    sensor_positions: [0.01, 0.03]
    n_steps: 121
    flux_families: [step, single_pulse]
    seeds: [42, 123]
    description: "Noise level much higher than normal"

  few_sensors:
    noise_levels: [0.5]
    sensor_positions: [0.03]   # single sensor
    n_steps: 121
    flux_families: [step, single_pulse, smooth_sinusoid]
    seeds: [42, 123]
    description: "Only one sensor"

  distant_sensors:
    noise_levels: [0.5]
    sensor_positions: [0.04, 0.045]   # sensors far from heated boundary
    n_steps: 121
    flux_families: [step, single_pulse]
    seeds: [42, 123]
    description: "Sensors near far-field boundary (poorly sensitive)"

  low_time_resolution:
    noise_levels: [0.5]
    sensor_positions: [0.01, 0.03]
    n_steps: 31     # ~4× coarser in time
    flux_families: [step, single_pulse, smooth_sinusoid]
    seeds: [42, 123]
    description: "Coarse temporal resolution"

  high_dimension:
    noise_levels: [0.5]
    sensor_positions: [0.01, 0.03]
    n_steps: 121
    flux_families: [step, single_pulse]
    seeds: [42, 123]
    num_parameters_override: 50   # force high parameter count
    description: "Too many parameters relative to data"

  wrong_noise_estimate:
    noise_levels: [0.5]    # true noise used during generation
    reported_noise_std: 0.05   # deliberately underestimated noise_std in config
    sensor_positions: [0.01, 0.03]
    n_steps: 121
    flux_families: [step, single_pulse]
    seeds: [42, 123]
    description: "Noise level underestimated (wrong discrepancy target)"

flux_params:
  step:
    q_base: 0.0
    q_step: 50000.0
    t_on_frac: 0.3
  ramp:
    q_start: 0.0
    q_end: 80000.0
  single_pulse:
    q_base: 0.0
    q_peak: 60000.0
    t_center_frac: 0.4
    t_width_frac: 0.2
  multi_pulse:
    q_base: 0.0
    q_peak: 50000.0
    n_pulses: 3
    t_width_frac: 0.08
  smooth_sinusoid:
    q_mean: 40000.0
    q_amplitude: 20000.0
    n_cycles: 2.0

variants:
  full_agent:
    reg_order: 1
    max_retries: 8
    iteration_budget: 12
    physical_bounds: [-5.0e5, 5.0e5]
