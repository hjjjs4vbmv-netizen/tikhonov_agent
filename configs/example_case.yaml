# example_case.yaml – demonstration case for tikhonov_agent
# Synthetic 1D IHCP: recover a step-then-decay heat flux on the left surface
# of a steel rod.  Observations are at two internal sensors.

problem_type: "1D_transient_IHCP"
dimension: 1
transient: true
target_name: "boundary_heat_flux"

description: >
  A steel rod (L=5 cm) is heated at the left face by an unknown time-varying
  heat flux.  Two thermocouples are embedded at 1 cm and 3 cm.  Reconstruct
  q(t) from the temperature time series.

time:
  start: 0.0
  end:   60.0       # [s]
  n_steps: 121      # dt = 0.5 s

geometry:
  length:  0.05     # [m]
  n_cells: 60

material:
  density:       7800.0
  specific_heat:  500.0
  conductivity:    50.0

boundary_conditions:
  right_type:  "dirichlet"
  right_value: 300.0   # [K]

sensor_positions:
  - 0.01
  - 0.03

initial_condition: 300.0

# Synthetic Gaussian noise on observations
noise_std: 0.3   # [K]  — enables discrepancy principle

observations_file: data/demo_temperature.csv

# Planner overrides
planner:
  reg_order: 1
  max_retries: 8
  iteration_budget: 12
  physical_bounds:
    - -5.0e5
    - 5.0e5

metadata:
  case_name: "example_step_flux"
  generated_by: "demo script"
